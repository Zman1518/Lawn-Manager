<!DOCTYPE html>
<html>

<head>

<title>Lawn Route Manager</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:40vh;
width:100%;
}

</style>

</head>

<body>

<h2>Lawn Route Manager</h2>

<div id="map"></div>

#map {
  height:40vh; /* 40% of screen height */
  width:100%;  /* full width */
}

<h3>Add Customer</h3>

<input id="name" placeholder="Customer Name">
<br><br>

<input id="address" placeholder="Customer Address">
<br><br>

<input id="phone" placeholder="Phone Number">
<br><br>

<input id="email" placeholder="Email">
<br><br>

<button onclick="saveCustomer()">Add Lawn</button>

<button onclick="buildRoute()">Build Today's Route</button>

<h3>Customers</h3>

<div id="customerList" ondragover="event.preventDefault()"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// create map
var map = L.map('map').setView([40.8,-77.8],12);

// add map tiles
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}).addTo(map);

var lawns = [];

// convert address to coordinates
async function getCoordinates(address){

let url =
"https://nominatim.openstreetmap.org/search?format=json&q="
+ encodeURIComponent(address);

let response = await fetch(url);
let data = await response.json();

if(data.length > 0){

return {
lat: parseFloat(data[0].lat),
lng: parseFloat(data[0].lon)
};

}

}

// add lawn pin
async function addLawn(name,address){

let coords = await getCoordinates(address);

if(!coords) return;

let lawn = {
name:name,
address:address,
lat:coords.lat,
lng:coords.lng
};

lawns.push(lawn);

L.marker([coords.lat,coords.lng])
.addTo(map)
.bindPopup(name);

}



function saveCustomer(){

let name =
document.getElementById("name").value;

let address =
document.getElementById("address").value;

let phone =
document.getElementById("phone").value;

let email =
document.getElementById("email").value;

if(!name || !address){
alert("Enter name and address");
return;
}

let customer = {
name:name,
address:address,
phone:phone,
email:email
};

addCustomerToList(customer);

// add map pin
addLawn(name,address);

// clear form
document.getElementById("name").value="";
document.getElementById("address").value="";
document.getElementById("phone").value="";
document.getElementById("email").value="";

}

function addCustomerToList(customer){

let list =
document.getElementById("customerList");

let item =
document.createElement("div");

item.style.border = "1px solid #ccc";
item.style.padding = "10px";
item.style.margin = "5px";

item.innerHTML =
"<b>"+customer.name+"</b><br>"
+customer.address+"<br>"
+customer.phone+"<br>"
+customer.email;

list.appendChild(item);

}

async function buildRoute(){

if(lawns.length < 2){
alert("Add at least two lawns");
return;
}

let coordinates = lawns
.map(lawn => lawn.lng + "," + lawn.lat)
.join(";");

let url =
"https://router.project-osrm.org/route/v1/driving/"
+ coordinates
+ "?overview=full&geometries=geojson";

let response = await fetch(url);

let data = await response.json();

let route =
data.routes[0].geometry.coordinates;

let routePoints =
route.map(point => [point[1], point[0]]);

L.polyline(routePoints,{
color:"blue",
weight:5
}).addTo(map);

map.fitBounds(routePoints);

}


</script>

</body>
</html>
